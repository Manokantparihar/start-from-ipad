<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resources – RPSC/REET Prep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animation-fadeIn { animation: fadeIn 0.3s ease-in; }
    .animation-slideIn { animation: slideIn 0.3s ease-in; }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Header/Navigation -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <div class="flex items-center gap-8">
        <a href="index.html" class="text-2xl font-bold text-blue-600">📚 RPSC/REET</a>
        <div class="hidden md:flex gap-6">
          <a href="index.html" class="text-gray-700 hover:text-blue-600 font-medium">Home</a>
          <a href="dashboard.html" class="text-gray-700 hover:text-blue-600 font-medium">My Dashboard</a>
          <a href="daily-quiz.html" class="text-gray-700 hover:text-blue-600 font-medium">Daily Quiz</a>
          <a href="topic-tests.html" class="text-gray-700 hover:text-blue-600 font-medium">Topic Tests</a>
          <a href="mock-tests.html" class="text-gray-700 hover:text-blue-600 font-medium">Mock Tests</a>
          <a href="resources.html" class="text-blue-600 font-semibold underline underline-offset-2">📄 Resources</a>
          <a id="adminQuizLink" href="/admin/" class="hidden text-blue-700 hover:text-blue-900 font-medium">🗂 Quiz Manager</a>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <!-- Notification Bell -->
        <div id="notifWidget" class="relative hidden">
          <button id="notifBell" title="Notifications" class="relative p-1 rounded-full hover:bg-gray-100 text-xl">
            🔔
            <span id="notifBadge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5 leading-none font-bold"></span>
          </button>
          <div id="notifDropdown" class="hidden absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-2xl border border-gray-100 z-50 max-h-96 overflow-y-auto"></div>
        </div>
        <a href="profile.html" class="text-gray-700 hover:text-blue-600 font-medium text-sm hidden sm:inline">My Profile</a>
        <span id="userName" class="text-gray-700 font-medium text-sm"></span>
        <button id="logoutBtn" class="px-3 py-1 text-sm bg-red-50 text-red-600 border border-red-200 rounded-lg hover:bg-red-100 font-medium">Logout</button>
      </div>
    </nav>
  </header>

  <!-- Loading Screen -->
  <div id="loadingScreen" class="flex items-center justify-center min-h-screen">
    <div class="text-center">
      <div class="inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
      <p class="text-gray-500">Loading resources…</p>
    </div>
  </div>

  <!-- Main Content -->
  <main id="mainContent" class="hidden max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10 animation-slideIn">

    <div class="flex items-center justify-between mb-8 flex-wrap gap-3">
      <div>
        <h2 class="text-3xl font-bold text-gray-800">📄 Study Resources</h2>
        <p class="text-gray-500 text-sm mt-1">PDFs, notes and assignments shared by admin</p>
      </div>
      <a id="adminResourcesLink" href="/admin/resources.html"
         class="hidden px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-semibold">
        ⚙️ Manage Resources
      </a>
    </div>

    <!-- Error Banner -->
    <div id="errorBanner" class="hidden mb-6 px-5 py-3 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm font-medium"></div>

    <!-- Resource List -->
    <div id="resourceList" class="space-y-4"></div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-20 bg-white rounded-xl shadow-sm">
      <div class="text-5xl mb-4">📂</div>
      <h3 class="text-xl font-semibold text-gray-700 mb-2">No resources yet</h3>
      <p class="text-gray-400 text-sm">Study materials will appear here once the admin uploads them.</p>
    </div>

  </main>

  <script>
    const API = '';

    // ── Helpers ───────────────────────────────────────────────────────────────

    function showError(msg) {
      const el = document.getElementById('errorBanner');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-IN', {
        year: 'numeric', month: 'short', day: 'numeric'
      });
    }

    // ── Auth Check ────────────────────────────────────────────────────────────

    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (!res.ok) return null;
        const data = await res.json();
        return data.user || null;
      } catch {
        return null;
      }
    }

    // ── Render Resources ──────────────────────────────────────────────────────

    function renderResources(resources) {
      const list = document.getElementById('resourceList');
      const empty = document.getElementById('emptyState');

      if (!resources.length) {
        empty.classList.remove('hidden');
        list.innerHTML = '';
        return;
      }

      empty.classList.add('hidden');
      list.innerHTML = resources.map(r => `
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex items-start gap-5 hover:shadow-md transition-shadow">
          <div class="flex-shrink-0 w-12 h-12 bg-red-50 rounded-xl flex items-center justify-center text-2xl">📄</div>
          <div class="flex-1 min-w-0">
            <h3 class="text-base font-semibold text-gray-800 truncate">${escHtml(r.title)}</h3>
            ${r.description ? `<p class="text-sm text-gray-500 mt-0.5 line-clamp-2">${escHtml(r.description)}</p>` : ''}
            <div class="flex flex-wrap gap-x-4 gap-y-1 mt-2 text-xs text-gray-400">
              <span>📁 ${escHtml(r.origFilename)}</span>
              <span>📦 ${formatSize(r.size)}</span>
              <span>📅 ${formatDate(r.uploadedAt)}</span>
              <span>👤 ${escHtml(r.uploadedBy)}</span>
            </div>
          </div>
          <a href="/api/resources/${r.id}/download"
             class="flex-shrink-0 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium flex items-center gap-1"
             download>
            ⬇ Download
          </a>
        </div>
      `).join('');
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Load Resources ────────────────────────────────────────────────────────

    async function loadResources() {
      try {
        const res = await fetch(`${API}/api/resources`, { credentials: 'include' });
        if (!res.ok) throw new Error('Failed to load resources');
        const data = await res.json();
        renderResources(data);
      } catch (e) {
        showError('Unable to load resources. Please try again later.');
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    async function init() {
      const user = await checkAuth();

      const loading = document.getElementById('loadingScreen');
      const main = document.getElementById('mainContent');
      loading.classList.add('hidden');
      main.classList.remove('hidden');

      if (user) {
        document.getElementById('userName').textContent = user.name || user.email;
        if (user.role === 'admin') {
          document.getElementById('adminQuizLink').classList.remove('hidden');
          document.getElementById('adminResourcesLink').classList.remove('hidden');
        }
      }

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
        window.location.href = '/index.html';
      });

      await loadResources();
    }

    init();
  </script>
  <script src="/js/notifications.js"></script>
</body>
</html>
