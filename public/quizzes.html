<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzes - RPSC/REET Prep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animation-fadeIn { animation: fadeIn 0.3s ease-in; }
    .animation-slideIn { animation: slideIn 0.3s ease-in; }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Navbar Mount Point -->
  <div id="appNavbar"></div>

  <!-- Custom history button (outside navbar) -->
  <div id="customQuizNav" class="hidden bg-white border-b border-gray-200 px-4 sm:px-6 lg:px-8 py-3 flex gap-3 max-w-7xl mx-auto">
    <button id="historyBtn" class="px-3 py-1.5 bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200 text-sm font-medium">📋 History</button>
  </div>
  <h1 id="pageTitle" class="sr-only"></h1>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Auth Required Message -->
    <div id="authRequired" class="hidden bg-yellow-50 border border-yellow-200 rounded-xl p-8 text-center animation-fadeIn">
      <div class="text-5xl mb-4">🔒</div>
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Login Required</h2>
      <p class="text-gray-600 mb-6">Please login to access quizzes and track your progress.</p>
      <a href="index.html" class="inline-block px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">Go to Login</a>
    </div>

    <!-- Loading indicator -->
    <div id="loadingMsg" class="text-center py-12 animation-fadeIn">
      <div class="text-4xl mb-4">⏳</div>
      <p class="text-gray-500">Loading...</p>
    </div>

    <!-- Error message -->
    <div id="errorMsg" class="hidden bg-red-50 border border-red-200 rounded-xl p-6 text-center animation-fadeIn">
      <p class="text-red-600 font-medium" id="errorText"></p>
      <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-sm">Retry</button>
    </div>

    <!-- Section: Quiz List -->
    <section id="quizListSection" class="hidden animation-fadeIn">
      <div class="mb-8">
        <h2 id="quizListHeading" class="text-3xl font-bold text-gray-800 mb-2">Available Quizzes</h2>
        <p id="quizListDescription" class="text-gray-600">Select a quiz to start. Your progress is saved automatically.</p>
      </div>
      <div id="quizList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </section>

    <!-- Section: Quiz Questions -->
    <section id="quizSection" class="hidden animation-fadeIn">
      <!-- Quiz Header -->
      <div class="flex justify-between items-center mb-6">
        <div>
          <h2 class="text-2xl font-bold text-gray-800" id="quizTitle"></h2>
          <div class="flex items-center gap-3 mt-1">
            <span class="text-sm text-gray-500" id="quizProgress">Question 1 of 0</span>
            <span class="text-sm text-orange-600 font-medium" id="timerDisplay"></span>
          </div>
        </div>
        <button id="abandonBtn" class="px-3 py-1.5 text-sm bg-gray-200 text-gray-600 rounded-lg hover:bg-gray-300">✕ Exit</button>
      </div>

      <!-- Progress Bar -->
      <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
        <div id="quizProgressBar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width:0%"></div>
      </div>

      <!-- Question Container -->
      <div id="questionContainer" class="bg-white rounded-xl shadow-md p-8 mb-6"></div>

      <!-- Navigation Buttons -->
      <div class="flex gap-4 mb-6">
        <button id="prevQuestionBtn" class="px-5 py-2.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 disabled:opacity-40 font-medium" disabled>← Prev</button>
        <button id="nextQuestionBtn" class="flex-1 px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">Next →</button>
        <button id="submitQuizBtn" class="hidden px-5 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 font-medium">✓ Submit Quiz</button>
      </div>

      <!-- Quick Navigation -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <p class="text-sm font-semibold text-gray-700 mb-3">Quick Navigation</p>
        <div id="quickNav" class="flex flex-wrap gap-2"></div>
      </div>
    </section>

    <!-- Section: Results -->
    <section id="resultsSection" class="hidden animation-slideIn">
      <div id="resultsContainer"></div>
      <div class="mt-6 flex flex-wrap gap-4">
        <button id="takeAnotherBtn" class="flex-1 px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium text-center">Take Another Quiz</button>
        <button id="viewHistoryBtn" class="flex-1 px-4 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-medium">📋 View History</button>
      </div>
    </section>

    <!-- Section: Attempt History -->
    <section id="historySection" class="hidden animation-fadeIn">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">📋 My Attempt History</h2>
        <button id="backToQuizzesBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-medium">← Back to Quizzes</button>
      </div>
      <div id="historyList"></div>
    </section>

  </main>

  <script src="/js/modules/navbar.js"></script>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    const MODE_CONFIG = {
      daily: {
        title: 'Daily Quiz',
        pageTitle: 'Daily Quiz',
        heading: 'Available Daily Quizzes',
        description: 'Choose a daily quiz to start your practice.'
      },
      topic: {
        title: 'Topic Tests',
        pageTitle: 'Topic Tests',
        heading: 'Available Topic Tests',
        description: 'Choose a topic test and focus on specific subjects.'
      },
      mock: {
        title: 'Mock Tests',
        pageTitle: 'Mock Tests',
        heading: 'Available Mock Tests',
        description: 'Choose a mock test for full-exam style practice.'
      },
      all: {
        title: 'Quizzes',
        pageTitle: 'Quizzes',
        heading: 'Available Quizzes',
        description: 'Select a quiz to start. Your progress is saved automatically.'
      }
    };

    let currentUser = null;
    let currentMode = 'all';
    let currentAttemptId = null;
    let currentQuizData = null;   // { id, title, questions }
    let currentQuizId = null;
    let userAnswers = {};          // { questionId: selectedOption }
    let currentQuestionIndex = 0;
    let timerInterval = null;
    let expiresAt = null;
    let saveDebounce = null;

    // ─── Init ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      if (window.Navbar) {
        Navbar.mount('#appNavbar', { active: 'quizzes' });
      }
      document.getElementById('customQuizNav').classList.remove('hidden');
      currentMode = getModeFromQuery();
      applyModeContext();
      await checkAuth();
    });

    function getModeFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const mode = (params.get('mode') || '').toLowerCase();
      return MODE_CONFIG[mode] ? mode : 'all';
    }

    function applyModeContext() {
      const cfg = MODE_CONFIG[currentMode] || MODE_CONFIG.all;
      document.title = `${cfg.title} - RPSC/REET Prep`;
      document.getElementById('pageTitle').textContent = cfg.pageTitle;
      document.getElementById('quizListHeading').textContent = cfg.heading;
      document.getElementById('quizListDescription').textContent = cfg.description;
    }

    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (!res.ok) {
          hide('loadingMsg');
          show('authRequired');
          return;
        }
        const data = await res.json();
        currentUser = data.user;
        const nameEl = document.getElementById('userNameDisplay');
        if (nameEl && currentUser?.name) {
          nameEl.textContent = currentUser.name;
          nameEl.classList.remove('hidden');
        }
        hide('loadingMsg');
        await loadQuizList();
      } catch {
        showError('Failed to connect to server. Please try again.');
      }
    }

    // ─── Quiz List ────────────────────────────────────────────────────────────
    async function loadQuizList() {
      try {
        const res = await fetch('/api/quizzes', { credentials: 'include' });
        if (!res.ok) throw new Error('Failed to load quizzes');
        const quizzes = await res.json();
        const visibleQuizzes = currentMode === 'all'
          ? quizzes
          : quizzes.filter(quiz => (quiz.mode || '').toLowerCase() === currentMode);

        const container = document.getElementById('quizList');
        if (visibleQuizzes.length === 0) {
          const emptyText = currentMode === 'all'
            ? 'No quizzes available yet.'
            : `No ${MODE_CONFIG[currentMode].title.toLowerCase()} available yet.`;
          container.innerHTML = `<p class="col-span-2 text-center text-gray-500 py-8">${escHtml(emptyText)}</p>`;
        } else {
          const colors = [
            'from-blue-500 to-blue-600',
            'from-purple-500 to-purple-600',
            'from-green-500 to-green-600',
            'from-orange-500 to-orange-600'
          ];
          container.innerHTML = visibleQuizzes.map((quiz, idx) => `
            <div class="bg-white rounded-xl shadow-md hover:shadow-lg transition-shadow overflow-hidden">
              <div class="bg-gradient-to-r ${colors[idx % colors.length]} h-24 flex items-center justify-center">
                <span class="text-4xl">📝</span>
              </div>
              <div class="p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-2">${escHtml(quiz.title)}</h3>
                <p class="text-gray-500 text-sm mb-4">${quiz.questionCount != null ? quiz.questionCount + ' questions' : 'Tap to start this quiz'}</p>
                <button
                  data-quiz-id="${escHtml(quiz.id)}"
                  class="start-quiz-btn w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium transition-colors">
                  Start Quiz
                </button>
              </div>
            </div>
          `).join('');
        }
        show('quizListSection');
        setupNavButtons();
      } catch (err) {
        showError(err.message || 'Failed to load quizzes');
      }
    }

    // ─── Start Quiz ───────────────────────────────────────────────────────────
    async function startQuiz(quizId) {
      try {
        showLoading('Starting quiz...');

        // Create attempt
        const attemptRes = await fetch('/api/attempts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ quizId })
        });
        if (!attemptRes.ok) {
          const err = await attemptRes.json();
          throw new Error(err.error || 'Failed to start attempt');
        }
        const { attemptId, expiresAt: exp } = await attemptRes.json();
        currentAttemptId = attemptId;
        expiresAt = exp;
        currentQuizId = quizId;
        userAnswers = {};
        currentQuestionIndex = 0;

        // Fetch quiz questions
        const quizRes = await fetch(`/api/quizzes/${quizId}`, { credentials: 'include' });
        if (!quizRes.ok) throw new Error('Failed to load quiz questions');
        currentQuizData = await quizRes.json();

        hide('loadingMsg');
        hide('quizListSection');
        show('quizSection');
        document.getElementById('quizTitle').textContent = currentQuizData.title;
        document.getElementById('pageTitle').textContent = currentQuizData.title;

        startTimer();
        renderQuestion();
        renderQuickNav();
      } catch (err) {
        hide('loadingMsg');
        showError(err.message || 'Could not start quiz');
      }
    }

    // ─── Render Question ──────────────────────────────────────────────────────
    function renderQuestion() {
      const q = currentQuizData.questions[currentQuestionIndex];
      const total = currentQuizData.questions.length;
      const answered = Object.keys(userAnswers).length;

      document.getElementById('quizProgress').textContent =
        `Question ${currentQuestionIndex + 1} of ${total} • ${answered} answered`;
      document.getElementById('quizProgressBar').style.width =
        `${((currentQuestionIndex + 1) / total) * 100}%`;

      const selected = userAnswers[q.id];

      document.getElementById('questionContainer').innerHTML = `
        <div class="mb-2 text-sm text-blue-600 font-semibold">Question ${currentQuestionIndex + 1}</div>
        <h3 class="text-xl font-bold text-gray-800 mb-6">${escHtml(q.text)}</h3>
        <div class="space-y-3" id="optionsContainer">
          ${q.options.map(opt => `
            <label class="flex items-center p-4 border-2 rounded-lg cursor-pointer hover:bg-blue-50 transition-all ${
              selected === opt ? 'border-blue-500 bg-blue-50' : 'border-gray-200'
            }">
              <input type="radio" name="answer"
                data-question-id="${escHtml(q.id)}"
                data-option="${escHtml(opt)}"
                class="w-4 h-4 text-blue-600 accent-blue-600 quiz-answer-radio"
                ${selected === opt ? 'checked' : ''}>
              <span class="ml-3 text-gray-700">${escHtml(opt)}</span>
            </label>
          `).join('')}
        </div>
      `;

      // Update nav buttons
      document.getElementById('prevQuestionBtn').disabled = currentQuestionIndex === 0;
      const isLast = currentQuestionIndex === total - 1;
      document.getElementById('nextQuestionBtn').classList.toggle('hidden', isLast);
      document.getElementById('submitQuizBtn').classList.toggle('hidden', !isLast);

      renderQuickNav();
    }

    // ─── Record Answer ────────────────────────────────────────────────────────
    function recordAnswer(questionId, selected) {
      userAnswers[questionId] = selected;
      // Highlight selected option
      document.querySelectorAll('#optionsContainer label').forEach(label => {
        const input = label.querySelector('input[type=radio]');
        if (input) {
          label.classList.toggle('border-blue-500', input.checked);
          label.classList.toggle('bg-blue-50', input.checked);
          label.classList.toggle('border-gray-200', !input.checked);
        }
      });
      renderQuickNav();
      // Auto-save with debounce
      clearTimeout(saveDebounce);
      saveDebounce = setTimeout(autoSave, 1000);
    }

    async function autoSave() {
      if (!currentAttemptId) return;
      try {
        await fetch(`/api/attempts/${currentAttemptId}/save`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ answers: buildAnswersArray() })
        });
      } catch {
        // Silent fail for auto-save
      }
    }

    function buildAnswersArray() {
      return Object.entries(userAnswers).map(([questionId, selected]) => ({ questionId, selected }));
    }

    // ─── Quick Navigation ─────────────────────────────────────────────────────
    function renderQuickNav() {
      const container = document.getElementById('quickNav');
      container.innerHTML = currentQuizData.questions.map((q, idx) => {
        const isAnswered = userAnswers[q.id] !== undefined;
        const isCurrent = idx === currentQuestionIndex;
        return `
          <button data-question-index="${idx}"
            class="quick-nav-btn w-9 h-9 rounded font-semibold text-sm transition-all ${
              isCurrent  ? 'bg-blue-600 text-white ring-2 ring-blue-300' :
              isAnswered ? 'bg-green-500 text-white' :
                           'bg-gray-200 text-gray-700 hover:bg-gray-300'
            }">
            ${idx + 1}
          </button>
        `;
      }).join('');
    }

    function goToQuestion(idx) {
      currentQuestionIndex = idx;
      renderQuestion();
    }

    // ─── Navigation ───────────────────────────────────────────────────────────
    function setupNavButtons() {
      document.getElementById('historyBtn').addEventListener('click', showHistory);
      document.getElementById('prevQuestionBtn').addEventListener('click', () => {
        if (currentQuestionIndex > 0) { currentQuestionIndex--; renderQuestion(); }
      });
      document.getElementById('nextQuestionBtn').addEventListener('click', () => {
        if (currentQuestionIndex < currentQuizData.questions.length - 1) {
          currentQuestionIndex++;
          renderQuestion();
        }
      });
      document.getElementById('submitQuizBtn').addEventListener('click', confirmSubmit);
      document.getElementById('abandonBtn').addEventListener('click', () => {
        if (confirm('Are you sure you want to exit? Your progress will be lost.')) {
          clearInterval(timerInterval);
          hide('quizSection');
          show('quizListSection');
          document.getElementById('pageTitle').textContent = MODE_CONFIG[currentMode].pageTitle;
          currentAttemptId = null;
          currentQuizData = null;
        }
      });
      document.getElementById('takeAnotherBtn').addEventListener('click', () => {
        hide('resultsSection');
        show('quizListSection');
        document.getElementById('pageTitle').textContent = MODE_CONFIG[currentMode].pageTitle;
      });
      document.getElementById('viewHistoryBtn').addEventListener('click', showHistory);
      document.getElementById('backToQuizzesBtn').addEventListener('click', () => {
        hide('historySection');
        show('quizListSection');
        document.getElementById('pageTitle').textContent = MODE_CONFIG[currentMode].pageTitle;
      });

      // Event delegation: start quiz buttons
      document.getElementById('quizList').addEventListener('click', (e) => {
        const btn = e.target.closest('.start-quiz-btn');
        if (btn) startQuiz(btn.dataset.quizId);
      });

      // Event delegation: quick nav buttons
      document.getElementById('quickNav').addEventListener('click', (e) => {
        const btn = e.target.closest('.quick-nav-btn');
        if (btn) goToQuestion(Number(btn.dataset.questionIndex));
      });

      // Event delegation: quiz answer radio buttons
      document.getElementById('questionContainer').addEventListener('change', (e) => {
        const input = e.target.closest('.quiz-answer-radio');
        if (input) recordAnswer(input.dataset.questionId, input.dataset.option);
      });
    }

    // ─── Submit Quiz ──────────────────────────────────────────────────────────
    async function confirmSubmit() {
      const total = currentQuizData.questions.length;
      const answered = Object.keys(userAnswers).length;
      const unanswered = total - answered;
      const msg = unanswered > 0
        ? `You have ${unanswered} unanswered question(s). Submit anyway?`
        : 'Submit the quiz?';
      if (!confirm(msg)) return;
      await submitQuiz();
    }

    async function submitQuiz() {
      try {
        clearInterval(timerInterval);
        showLoading('Submitting...');

        const res = await fetch(`/api/attempts/${currentAttemptId}/submit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ answers: buildAnswersArray() })
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Submit failed');
        }
        const { score, total } = await res.json();

        hide('loadingMsg');
        hide('quizSection');
        show('resultsSection');
        document.getElementById('pageTitle').textContent = 'Results';
        showResults(score, total);
        currentAttemptId = null;
      } catch (err) {
        hide('loadingMsg');
        showError(err.message || 'Failed to submit quiz');
      }
    }

    function showResults(score, total) {
      const percentage = total > 0 ? Math.round((score / total) * 100) : 0;
      const colorClass = percentage >= 70 ? 'text-green-600' : percentage >= 50 ? 'text-yellow-600' : 'text-red-600';
      const colorHex = percentage >= 70 ? '22c55e' : percentage >= 50 ? 'eab308' : 'ef4444';
      const feedback = percentage >= 70 ? '🎉 Excellent work! Keep it up!' :
                       percentage >= 50 ? '👍 Good effort! Keep practicing!' :
                                          '💪 Keep practicing, you\'ll get better!';

      document.getElementById('resultsContainer').innerHTML = `
        <div class="bg-white rounded-xl shadow-md p-8 text-center animation-slideIn">
          <h2 class="text-3xl font-bold text-gray-800 mb-6">Quiz Complete!</h2>
          <div class="mb-6">
            <div class="inline-block relative w-40 h-40">
              <svg class="w-40 h-40 transform -rotate-90">
                <circle cx="80" cy="80" r="70" fill="none" stroke="#e5e7eb" stroke-width="12"/>
                <circle cx="80" cy="80" r="70" fill="none" stroke="#${colorHex}" stroke-width="12"
                  stroke-dasharray="${(percentage / 100) * 439.8}" stroke-dashoffset="0" stroke-linecap="round"/>
              </svg>
              <div class="absolute inset-0 flex items-center justify-center flex-col">
                <div class="text-4xl font-bold ${colorClass}">${percentage}%</div>
                <div class="text-xs text-gray-500">Score</div>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4 max-w-xs mx-auto mb-6">
            <div class="bg-green-50 rounded-lg p-4">
              <div class="text-3xl font-bold text-green-600">${score}</div>
              <div class="text-sm text-gray-600">Correct</div>
            </div>
            <div class="bg-red-50 rounded-lg p-4">
              <div class="text-3xl font-bold text-red-600">${total - score}</div>
              <div class="text-sm text-gray-600">Wrong</div>
            </div>
          </div>
          <p class="text-lg font-semibold text-gray-700">${feedback}</p>
        </div>
      `;
    }

    // ─── Timer ────────────────────────────────────────────────────────────────
    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        const remaining = expiresAt - Date.now();
        if (remaining <= 0) {
          clearInterval(timerInterval);
          document.getElementById('timerDisplay').textContent = '⏰ Time up!';
          document.getElementById('timerDisplay').className = 'text-sm text-red-600 font-medium';
          submitQuiz();
          return;
        }
        const mins = Math.floor(remaining / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        const display = `⏰ ${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        const timerEl = document.getElementById('timerDisplay');
        timerEl.textContent = display;
        timerEl.className = remaining < 120000
          ? 'text-sm text-red-600 font-bold animate-pulse'
          : 'text-sm text-orange-600 font-medium';
      }, 1000);
    }

    // ─── History ──────────────────────────────────────────────────────────────
    async function showHistory() {
      try {
        hide('quizListSection');
        hide('resultsSection');
        showLoading('Loading history...');

        const res = await fetch('/api/attempts', { credentials: 'include' });
        if (!res.ok) throw new Error('Failed to load history');
        const attempts = await res.json();

        hide('loadingMsg');
        show('historySection');
        document.getElementById('pageTitle').textContent = 'History';

        const container = document.getElementById('historyList');
        if (attempts.length === 0) {
          container.innerHTML = `
            <div class="bg-white rounded-xl shadow-sm p-8 text-center">
              <div class="text-5xl mb-4">📋</div>
              <p class="text-gray-500">No attempts yet. Start a quiz!</p>
            </div>`;
          return;
        }

        container.innerHTML = attempts.map(a => {
          const date = new Date(a.createdAt).toLocaleDateString('en-IN', {
            day: 'numeric', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
          const statusColor = a.status === 'completed' ? 'bg-green-100 text-green-700' :
                              a.status === 'expired'   ? 'bg-red-100 text-red-700' :
                                                         'bg-yellow-100 text-yellow-700';
          const scoreText = (a.status === 'completed' || a.status === 'expired') && a.total > 0
            ? `${a.score}/${a.total} (${Math.round((a.score/a.total)*100)}%)`
            : a.status === 'in-progress' ? 'In progress' : '-';
          return `
            <div class="bg-white rounded-xl shadow-sm p-5 mb-4 flex justify-between items-center hover:shadow-md transition-shadow">
              <div>
                <p class="font-semibold text-gray-800">${escHtml(a.quizTitle || a.quizId)}</p>
                <p class="text-sm text-gray-500 mt-0.5">${date}</p>
              </div>
              <div class="text-right">
                <span class="inline-block px-2.5 py-1 rounded-full text-xs font-semibold ${statusColor} mb-1">${a.status}</span>
                <p class="text-lg font-bold text-blue-600">${scoreText}</p>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        hide('loadingMsg');
        showError(err.message || 'Failed to load history');
      }
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }

    function showLoading(msg) {
      hide('quizListSection');
      hide('quizSection');
      hide('resultsSection');
      hide('historySection');
      hide('errorMsg');
      const el = document.getElementById('loadingMsg');
      el.innerHTML = `<div class="text-4xl mb-4">⏳</div><p class="text-gray-500">${escHtml(msg)}</p>`;
      el.classList.remove('hidden');
    }

    function showError(msg) {
      hide('loadingMsg');
      document.getElementById('errorText').textContent = msg;
      show('errorMsg');
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
  <script src="/js/notifications.js"></script>
</body>
</html>
