<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic Tests - RPSC/REET Prep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="bg-gray-50">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold text-blue-600">📚 RPSC/REET</a>
      <h1 class="text-lg font-semibold text-gray-800">Topic Tests</h1>
      <a href="index.html" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300">← Dashboard</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <section id="topicSelectionSection">
      <h2 class="text-3xl font-bold text-gray-800 mb-8">Choose a Topic</h2>
      <div id="topicsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Topics will be loaded from QuestionBank -->
      </div>
    </section>

    <section id="quizSection" class="hidden">
      <button id="backToTopics" class="mb-6 px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300">← Back</button>
      
      <div class="mb-6">
        <div class="flex justify-between items-center mb-2">
          <span class="text-gray-700 font-semibold" id="questionProgress">Question 1 of 10</span>
          <span class="text-gray-500 text-sm" id="answeredCount">0 answered</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3">
          <div id="progressBar" class="bg-blue-600 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>

      <div id="questionContainer" class="mb-8"></div>

      <div class="flex gap-4 mb-6">
        <button id="prevBtn" class="px-6 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 disabled:opacity-50" disabled>← Previous</button>
        <button id="nextBtn" class="flex-1 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">Next →</button>
        <button id="submitBtn" class="hidden px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 font-medium">Submit</button>
      </div>

      <div class="bg-white rounded-lg p-6">
        <h3 class="font-semibold text-gray-800 mb-4">Quick Navigation</h3>
        <div id="quickNav" class="grid grid-cols-5 md:grid-cols-10 gap-2"></div>
      </div>
    </section>

    <section id="resultsSection" class="hidden">
      <div id="resultsContainer"></div>
      <div class="mt-8 flex gap-4">
        <button id="retakeBtn" class="flex-1 px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">Retake Test</button>
        <button id="reviewBtn" class="flex-1 px-4 py-3 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 font-medium">Review Answers</button>
        <a href="index.html" class="flex-1 px-4 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-medium text-center">Dashboard</a>
      </div>
      <div id="reviewSection" class="hidden mt-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Review Your Answers</h2>
        <div id="reviewContainer" class="space-y-6"></div>
      </div>
    </section>
  </main>

  <script src="js/modules/questionBank.js"></script>
  <script src="js/modules/user.js"></script>
  <script src="js/modules/progressTracker.js"></script>
  <script src="js/modules/quizEngine.js"></script>
  <script src="js/modules/ui.js"></script>

  <script>
    let selectedTopic = null;

    document.addEventListener('DOMContentLoaded', async () => {
      await QuestionBank.init();
      if (!User.isLoggedIn()) {
        location.href = 'index.html';
        return;
      }
      loadTopics();
      setupEventListeners();
    });

    function loadTopics() {
      const topics = QuestionBank.getTopics();
      const grid = document.getElementById('topicsGrid');

      grid.innerHTML = topics.map(topic => `
        <div onclick="selectTopic('${topic.name}')" class="bg-white rounded-xl shadow-md hover:shadow-lg transition-shadow p-6 cursor-pointer border-2 border-transparent hover:border-blue-600">
          <h3 class="text-xl font-bold text-gray-800 mb-2">📚 ${topic.name}</h3>
          <p class="text-gray-600 mb-4">${topic.subtopics.length} subtopics</p>
          <button class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 w-full">Start Test</button>
        </div>
      `).join('');
    }

    function selectTopic(topic) {
      selectedTopic = topic;
      const questions = QuestionBank.getQuestionsByTopic(topic);
      const count = Math.min(15, questions.length);
      QuizEngine.startQuiz(questions.slice(0, count), {
        type: 'topicwise',
        topic: topic
      });

      document.getElementById('topicSelectionSection').classList.add('hidden');
      document.getElementById('quizSection').classList.remove('hidden');
      renderQuestion();
      updateProgress();
    }

    function renderQuestion() {
      const question = QuizEngine.getCurrentQuestion();
      if (!question) return;

      const container = document.getElementById('questionContainer');
      const progress = QuizEngine.getProgress();

      container.innerHTML = `
        <div class="bg-white rounded-xl shadow-md p-8">
          <h3 class="text-xl font-bold text-gray-800 mb-6">${question.question}</h3>
          <div class="space-y-3">
            ${question.options.map((opt, i) => {
              const userAnswerIdx = QuizEngine.getUserAnswer(QuizEngine.getCurrentQuestionIndex());
              const isSelected = i === userAnswerIdx;
              return `
              <label class="flex items-center p-4 border-2 border-gray-300 rounded-lg cursor-pointer hover:bg-blue-50 transition-all ${
                isSelected ? 'border-blue-600 bg-blue-50' : ''
              }">
                <input type="radio" name="answer" value="${i}" class="w-4 h-4" ${
                  isSelected ? 'checked' : ''
                } onchange="recordAnswer(${i})">
                <span class="ml-3 text-lg text-gray-700">${opt}</span>
              </label>
            `;
            }).join('')}
          </div>
        </div>
      `;
      updateQuickNav();
    }

    function recordAnswer(idx) {
      QuizEngine.recordAnswer(idx);
      updateProgress();
    }

    function setupEventListeners() {
      document.getElementById('prevBtn').addEventListener('click', () => {
        if (QuizEngine.previousQuestion()) renderQuestion();
      });

      document.getElementById('nextBtn').addEventListener('click', () => {
        if (QuizEngine.nextQuestion()) {
          renderQuestion();
        } else {
          document.getElementById('nextBtn').classList.add('hidden');
          document.getElementById('submitBtn').classList.remove('hidden');
        }
      });

      document.getElementById('submitBtn').addEventListener('click', () => {
        const result = QuizEngine.endQuiz();
        showResults(result);
      });

      document.getElementById('backToTopics').addEventListener('click', () => {
        location.reload();
      });

      document.getElementById('reviewBtn').addEventListener('click', () => {
        document.getElementById('reviewSection').classList.toggle('hidden');
        if (!document.getElementById('reviewSection').classList.contains('hidden')) {
          renderReview();
        }
      });

      document.getElementById('retakeBtn').addEventListener('click', () => {
        location.reload();
      });
    }

    function updateProgress() {
      const progress = QuizEngine.getProgress();
      document.getElementById('questionProgress').textContent = `Question ${progress.current} of ${progress.total}`;
      document.getElementById('answeredCount').textContent = `${progress.answered} answered`;
      document.getElementById('progressBar').style.width = `${progress.percentage}%`;
    }

    function updateQuickNav() {
      const container = document.getElementById('quickNav');
      const total = QuizEngine.getTotalQuestions();
      let html = '';

      for (let i = 0; i < total; i++) {
        const isCurrent = i === QuizEngine.getCurrentQuestionIndex();
        const answers = QuizEngine.buildAnswerDetails();
        const isAnswered = answers[i] && answers[i].userAnswer !== null;

        html += `<button onclick="goToQuestion(${i})" class="w-8 h-8 rounded font-semibold text-sm ${
          isCurrent ? 'bg-blue-600 text-white' : isAnswered ? 'bg-green-500 text-white' : 'bg-gray-200'
        }">${i + 1}</button>`;
      }

      container.innerHTML = html;
    }

    function goToQuestion(idx) {
      QuizEngine.goToQuestion(idx);
      renderQuestion();
    }

    function showResults(result) {
      document.getElementById('quizSection').classList.add('hidden');
      document.getElementById('resultsSection').classList.remove('hidden');

      const container = document.getElementById('resultsContainer');
      const percentage = result.score;
      const color = percentage >= 70 ? 'green' : percentage >= 50 ? 'yellow' : 'red';

      container.innerHTML = `
        <div class="bg-white rounded-xl shadow-md p-8 text-center">
          <h2 class="text-4xl font-bold text-gray-800 mb-8">Test Complete! 🎿</h2>
          <div class="text-5xl font-bold ${color === 'green' ? 'text-green-600' : color === 'yellow' ? 'text-yellow-600' : 'text-red-600'} mb-4">${percentage}%</div>
          <div class="text-2xl font-semibold text-gray-600 mb-8">${result.correctAnswers}/${result.totalQuestions} Correct</div>
          <div class="grid grid-cols-3 gap-4">
            <div class="bg-green-50 p-4 rounded-lg">
              <div class="text-2xl font-bold text-green-600">${result.correctAnswers}</div>
              <div class="text-sm text-gray-600">Correct</div>
            </div>
            <div class="bg-red-50 p-4 rounded-lg">
              <div class="text-2xl font-bold text-red-600">${result.totalQuestions - result.correctAnswers}</div>
              <div class="text-sm text-gray-600">Incorrect</div>
            </div>
            <div class="bg-blue-50 p-4 rounded-lg">
              <div class="text-2xl font-bold text-blue-600">${UI.formatTime(result.timeSpent)}</div>
              <div class="text-sm text-gray-600">Time Taken</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderReview() {
      const answers = QuizEngine.buildAnswerDetails();
      const container = document.getElementById('reviewContainer');

      container.innerHTML = answers.map((ans, i) => {
        const borderClass = ans.isCorrect ? 'border-green-500' : 'border-red-500';
        const icon = ans.isCorrect ? '✅' : '❌';
        const userAns = QuestionBank.getQuestionById(ans.questionId).options[ans.userAnswer] || 'Not answered';
        const correctAns = QuestionBank.getQuestionById(ans.questionId).options[ans.correctAnswer];
        
        return `
          <div class="bg-white p-6 rounded-lg border-l-4 ${borderClass}">
            <div class="font-semibold mb-2">${icon} Q${i + 1}: ${ans.question}</div>
            <p class="text-sm text-gray-700 mb-1"><strong>Your answer:</strong> ${userAns}</p>
            <p class="text-sm text-gray-700"><strong>Correct:</strong> ${correctAns}</p>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
