<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications - RPSC/REET</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="appNavbar"></div>

  <main class="mx-auto w-full max-w-4xl px-4 py-6 sm:px-6 lg:px-8">
    <section class="rounded-2xl border border-slate-200 bg-white overflow-hidden">
      <div class="border-b border-slate-200 bg-white px-4 py-4 sm:px-6">
        <div class="mb-4 flex items-center justify-between gap-3">
          <div>
            <h1 class="text-2xl font-semibold text-slate-900">Notifications</h1>
            <p class="mt-1 text-sm text-slate-600">View updates, announcements, and quick actions.</p>
          </div>
          <div id="notificationsPageControls"></div>
        </div>

        <div id="notificationsPageFilters" class="flex flex-wrap gap-2">
          <button data-filter="all" class="notifications-filter-btn rounded-full border border-blue-200 bg-blue-50 px-4 py-2 text-sm font-semibold text-blue-700">All</button>
          <button data-filter="unread" class="notifications-filter-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">Unread</button>
          <button data-filter="read" class="notifications-filter-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">Read</button>
          <button data-filter="archive" class="notifications-filter-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">Archive</button>
        </div>
      </div>

      <div id="notificationsPageList" class="p-4 sm:p-6"></div>
    </section>
  </main>

  <script src="/js/modules/navbar.js"></script>
  <script>
    Navbar.mount('#appNavbar', { active: 'dashboard' });
  </script>
  <script src="/js/notifications.js"></script>
</body>
</html>
