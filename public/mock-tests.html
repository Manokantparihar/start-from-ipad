<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Tests - RPSC/REET Prep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="bg-gray-50">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold text-blue-600">📚 RPSC/REET</a>
      <h1 class="text-lg font-semibold text-gray-800">Mock Tests</h1>
      <a href="index.html" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300">← Dashboard</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Selection Section -->
    <section id="testSelectionSection">
      <h2 class="text-3xl font-bold text-gray-800 mb-8">Mock Tests</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div onclick="startMockTest(50, 180)" class="bg-white rounded-xl shadow-md hover:shadow-lg transition-shadow p-8 cursor-pointer border-2 border-transparent hover:border-blue-600">
          <h3 class="text-2xl font-bold text-gray-800 mb-2">📋 Full Mock Test</h3>
          <p class="text-gray-600 mb-4">50 questions • 3 hours • All topics</p>
          <div class="flex justify-between items-center">
            <span class="text-sm text-gray-500">Difficulty: Hard</span>
            <button class="px-6 py-2 bg-blue-600 text-white rounded-lg">Start</button>
          </div>
        </div>

        <div onclick="startMockTest(30, 90)" class="bg-white rounded-xl shadow-md hover:shadow-lg transition-shadow p-8 cursor-pointer border-2 border-transparent hover:border-green-600">
          <h3 class="text-2xl font-bold text-gray-800 mb-2">⚡ Quick Test</h3>
          <p class="text-gray-600 mb-4">30 questions • 90 minutes • Mixed topics</p>
          <div class="flex justify-between items-center">
            <span class="text-sm text-gray-500">Difficulty: Medium</span>
            <button class="px-6 py-2 bg-green-600 text-white rounded-lg">Start</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Quiz Section -->
    <section id="quizSection" class="hidden">
      <!-- Timer Bar -->
      <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-6 rounded-lg mb-6">
        <div class="flex justify-between items-center">
          <div>
            <div class="text-sm opacity-90">Time Remaining</div>
            <div id="timerDisplay" class="text-4xl font-bold">3:00:00</div>
          </div>
          <div>
            <div class="text-sm opacity-90">Progress</div>
            <div id="progressText" class="text-2xl font-semibold">1/50</div>
          </div>
        </div>
        <div class="mt-4 bg-white bg-opacity-20 rounded-full h-3">
          <div id="timerProgress" class="h-3 rounded-full bg-white transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>

      <!-- Question -->
      <div id="questionContainer" class="mb-8"></div>

      <!-- Navigation -->
      <div class="flex gap-4 mb-6">
        <button id="prevBtn" class="px-6 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 disabled:opacity-50" disabled>← Previous</button>
        <button id="nextBtn" class="flex-1 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">Next →</button>
        <button id="submitBtn" class="hidden px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 font-medium">Submit & End</button>
      </div>

      <!-- Quick Nav -->
      <div id="quickNavContainer" class="bg-white rounded-lg p-6">
        <h3 class="font-semibold text-gray-800 mb-4">Question Navigator</h3>
        <div id="quickNav" class="grid grid-cols-10 gap-2"></div>
      </div>
    </section>

    <!-- Results Section -->
    <section id="resultsSection" class="hidden">
      <div id="resultsContainer"></div>
      <div class="mt-8 flex gap-4">
        <button id="reviewBtn" class="flex-1 px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">Review Test</button>
        <a href="index.html" class="flex-1 px-4 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-medium text-center">Back to Dashboard</a>
      </div>
      <div id="reviewSection" class="hidden mt-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Test Review</h2>
        <div id="reviewContainer" class="space-y-4"></div>
      </div>
    </section>
  </main>

  <script src="js/modules/questionBank.js"></script>
  <script src="js/modules/user.js"></script>
  <script src="js/modules/progressTracker.js"></script>
  <script src="js/modules/quizEngine.js"></script>
  <script src="js/modules/ui.js"></script>

  <script>
    let mockConfig = { questionCount: 50, timeLimit: 180 };

    document.addEventListener('DOMContentLoaded', async () => {
      await QuestionBank.init();
      if (!User.isLoggedIn()) {
        location.href = 'index.html';
        return;
      }
      setupEventListeners();
    });

    function setupEventListeners() {
      document.getElementById('prevBtn').addEventListener('click', goToPrevious);
      document.getElementById('nextBtn').addEventListener('click', goToNext);
      document.getElementById('submitBtn').addEventListener('click', submitMockTest);
      document.getElementById('reviewBtn').addEventListener('click', toggleReview);
    }

    function startMockTest(questionCount, minutesLimit) {
      mockConfig = { questionCount, timeLimit: minutesLimit * 60 };

      const questions = QuestionBank.getRandomQuestions(questionCount, null);
      QuizEngine.startQuiz(questions, {
        type: 'mock',
        title: `Mock Test - ${questionCount} Questions`,
        timeLimit: mockConfig.timeLimit
      });

      document.getElementById('testSelectionSection').classList.add('hidden');
      document.getElementById('quizSection').classList.remove('hidden');

      renderQuestion();
      updateProgress();
      updateTimer();

      QuizEngine.startTimer((remaining) => {
        if (remaining === -1) {
          submitMockTest();
        } else {
          updateTimer();
        }
      });
    }

    function renderQuestion() {
      const question = QuizEngine.getCurrentQuestion();
      if (!question) return;

      const container = document.getElementById('questionContainer');
      container.innerHTML = `
        <div class="bg-white rounded-xl shadow-md p-8">
          <h3 class="text-xl font-bold text-gray-800 mb-6">${question.question}</h3>
          <div class="space-y-3">
            ${question.options.map((opt, i) => {
              const userAnswerIdx = QuizEngine.getUserAnswer(QuizEngine.getCurrentQuestionIndex());
              const isSelected = i === userAnswerIdx;
              return `
              <label class="flex items-center p-4 border-2 border-gray-300 rounded-lg cursor-pointer hover:bg-blue-50 transition-colors ${
                isSelected ? 'border-blue-600 bg-blue-50' : ''
              }">
                <input type="radio" name="answer" value="${i}" class="w-4 h-4" ${
                  isSelected ? 'checked' : ''
                } onchange="recordAnswer(${i})">
                <span class="ml-4 text-lg text-gray-700">${opt}</span>
              </label>
            `;
            }).join('')}
          </div>
        </div>
      `;
      updateQuickNav();
    }

    function recordAnswer(idx) {
      QuizEngine.recordAnswer(idx);
    }

    function goToNext() {
      if (QuizEngine.nextQuestion()) {
        renderQuestion();
        updateProgress();
      } else {
        document.getElementById('nextBtn').classList.add('hidden');
        document.getElementById('submitBtn').classList.remove('hidden');
      }
    }

    function goToPrevious() {
      if (QuizEngine.previousQuestion()) {
        renderQuestion();
        updateProgress();
      }
    }

    function updateProgress() {
      const progress = QuizEngine.getProgress();
      document.getElementById('progressText').textContent = `${progress.current}/${progress.total}`;
    }

    function updateTimer() {
      const progress = QuizEngine.getProgress();
      const totalSeconds = mockConfig.timeLimit;
      const currentQuestion = QuizEngine.getCurrentQuestionIndex();
      const elapsedPercentage = (currentQuestion / QuizEngine.getTotalQuestions()) * 100;

      document.getElementById('timerProgress').style.width = elapsedPercentage + '%';
    }

    function updateQuickNav() {
      const container = document.getElementById('quickNav');
      const total = QuizEngine.getTotalQuestions();
      let html = '';

      for (let i = 0; i < total; i++) {
        const isCurrent = i === QuizEngine.getCurrentQuestionIndex();
        html += `<button onclick="goToQuestion(${i})" class="w-8 h-8 rounded font-semibold text-xs ${
          isCurrent ? 'bg-blue-600 text-white' : 'bg-gray-200 hover:bg-gray-300'
        }">${i + 1}</button>`;
      }

      container.innerHTML = html;
    }

    function goToQuestion(idx) {
      QuizEngine.goToQuestion(idx);
      renderQuestion();
    }

    function submitMockTest() {
      QuizEngine.stopTimer();

      if (confirm('Are you sure you want to submit? You cannot change answers after submission.')) {
        const result = QuizEngine.endQuiz();
        showResults(result);
      }
    }

    function showResults(result) {
      document.getElementById('quizSection').classList.add('hidden');
      document.getElementById('resultsSection').classList.remove('hidden');

      const container = document.getElementById('resultsContainer');
      const percentage = result.score;

      container.innerHTML = `
        <div class="bg-white rounded-xl shadow-md p-8 text-center">
          <h2 class="text-4xl font-bold text-gray-800 mb-8">Mock Test Complete! 🎉</h2>
          <div class="text-6xl font-bold ${percentage >= 70 ? 'text-green-600' : percentage >= 50 ? 'text-yellow-600' : 'text-red-600'} mb-4">${percentage}%</div>
          <div class="text-2xl font-semibold text-gray-600 mb-8">${result.correctAnswers}/${result.totalQuestions} Answers Correct</div>
          <div class="grid grid-cols-4 gap-4">
            <div class="bg-green-50 p-4 rounded-lg">
              <div class="text-2xl font-bold text-green-600">${result.correctAnswers}</div>
              <div class="text-sm text-gray-600">Correct</div>
            </div>
            <div class="bg-red-50 p-4 rounded-lg">
              <div class="text-2xl font-bold text-red-600">${result.totalQuestions - result.correctAnswers}</div>
              <div class="text-sm text-gray-600">Wrong</div>
            </div>
            <div class="bg-yellow-50 p-4 rounded-lg">
              <div class="text-2xl font-bold text-yellow-600">0</div>
              <div class="text-sm text-gray-600">Unanswered</div>
            </div>
            <div class="bg-blue-50 p-4 rounded-lg">
              <div class="text-2xl font-bold text-blue-600">${UI.formatTime(result.timeSpent)}</div>
              <div class="text-sm text-gray-600">Time Taken</div>
            </div>
          </div>
        </div>
      `;
    }

    function toggleReview() {
      document.getElementById('reviewSection').classList.toggle('hidden');
      if (!document.getElementById('reviewSection').classList.contains('hidden')) {
        renderReview();
      }
    }

    function renderReview() {
      const answers = QuizEngine.buildAnswerDetails();
      const container = document.getElementById('reviewContainer');

      container.innerHTML = answers.map((ans, i) => {
        const borderClass = ans.isCorrect ? 'border-green-500' : 'border-red-500';
        const icon = ans.isCorrect ? '✅' : '❌';
        const userAns = QuestionBank.getQuestionById(ans.questionId).options[ans.userAnswer] || 'Not answered';
        const correctAns = QuestionBank.getQuestionById(ans.questionId).options[ans.correctAnswer];
        
        return `
          <div class="bg-white p-4 rounded-lg border-l-4 ${borderClass}">
            <div class="flex justify-between items-start">
              <div>
                <p class="font-semibold text-gray-800">Q${i + 1}: ${ans.question.substring(0, 60)}...</p>
                <p class="text-sm text-gray-600 mt-2"><strong>Your:</strong> ${userAns}</p>
                <p class="text-sm text-gray-600"><strong>Correct:</strong> ${correctAns}</p>
              </div>
              <span class="text-2xl">${icon}</span>
            </div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
